name: Build and Push to CCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/build-and-push-ccr.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk
        run: |
          sudo rm -rf /opt/android* /usr/local/lib/android /usr/share/dotnet
          sudo apt-get clean
          df -h /

      - name: Set up QEMU + Buildx
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to Tencent Cloud CCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}

      - name: Build and push to CCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:latest
            ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:${{ github.sha }}
          cache-from: type=registry,ref=ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:latest
          cache-to: type=inline

      - name: Summary
        run: |
          echo "## CCR push" >> $GITHUB_STEP_SUMMARY
          echo "- registry: \`ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b\`" >> $GITHUB_STEP_SUMMARY
          echo "- tags: latest, \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- source: \`${{ github.sha }}\` commit" >> $GITHUB_STEP_SUMMARY