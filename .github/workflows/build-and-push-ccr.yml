name: Build and Push to CCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/build-and-push-ccr.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk
        run: |
          sudo rm -rf /opt/android* /usr/local/lib/android /usr/share/dotnet
          sudo apt-get clean
          df -h /

      - name: Set up QEMU + Buildx
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Download models via hf-mirror.com
        run: |
          mkdir -p models
          cd models
          # 国内镜像,早上 124 上实测 ~2.3 MB/s;走 hf-mirror.com
          # 也试 huggingface.co fallback,看哪个快
          echo "=== Try hf-mirror.com first ==="
          timeout 30 wget --continue -q --show-progress \
            "https://hf-mirror.com/unsloth/gemma-4-12b-it-GGUF/resolve/main/gemma-4-12b-it-Q6_K.gguf" \
            -O gemma-4-12b-it-Q6_K.gguf 2>&1 | tail -1
          HFEXIT=${PIPESTATUS[0]}
          if [ "$HFEXIT" -ne 0 ]; then
            echo "=== hf-mirror 失败,fallback huggingface.co ==="
            rm -f gemma-4-12b-it-Q6_K.gguf
            wget --continue -q \
              "https://huggingface.co/unsloth/gemma-4-12b-it-GGUF/resolve/main/gemma-4-12b-it-Q6_K.gguf" \
              -O gemma-4-12b-it-Q6_K.gguf
          fi
          wget --continue -q \
            "https://hf-mirror.com/unsloth/gemma-4-12b-it-GGUF/resolve/main/mmproj-F16.gguf" \
            -O mmproj-F16.gguf
          ls -lh .
          echo "=== sha256 校验 ==="
          sha256sum gemma-4-12b-it-Q6_K.gguf
          sha256sum mmproj-F16.gguf

      - name: Login to Tencent Cloud CCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}

      - name: Build and push to CCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:v1
            ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:${{ github.sha }}
          cache-from: type=registry,ref=ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:v1
          cache-to: type=inline

      - name: Summary
        run: |
          echo "## CCR push" >> $GITHUB_STEP_SUMMARY
          echo "- registry: \`ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b\`" >> $GITHUB_STEP_SUMMARY
          echo "- tags: v1, \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- source: \`${{ github.sha }}\` commit" >> $GITHUB_STEP_SUMMARY
