name: Build SCF image (local/dev only)

# NOTE: as of 2026-07-08, the image no longer bundles the GGUF model
# (model lives on CFS mount at runtime). This workflow is kept for local
# `docker build` sanity checks only. Smoke test is disabled because the
# container now requires a real CFS (or -v) mount to find MODEL_PATH.
#
# Trigger manually with workflow_dispatch when you want to verify the
# Dockerfile builds clean.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: llama-scf-dev
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk (delete Android SDK leftovers)
        run: |
          sudo rm -rf /opt/android* /usr/local/lib/android /usr/share/dotnet
          sudo apt-get clean
          df -h /

      - name: Set up QEMU + Buildx
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Build image (no model — sanity check only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=ccr.ccs.tencentyun.com/jerryliang/gemma-4-12b:latest
          cache-to: type=inline

      - name: Inspect image
        run: |
          docker images "${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }}" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" || \
          docker images "${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }}"
          echo "## Build summary" >> $GITHUB_STEP_SUMMARY
          echo "- image: \`${{ env.IMAGE_NAME}}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- model is NOT in image; deploy requires CFS mount at /mnt" >> $GITHUB_STEP_SUMMARY